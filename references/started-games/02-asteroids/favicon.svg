<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Fondo negro -->
  <rect width="32" height="32" fill="#000"/>

  <!-- Nave espacial (triángulo estilo Asteroids, apuntando arriba) -->
  <!-- Cuerpo principal: triángulo -->
  <polygon
    points="16,4 27,26 16,22 5,26"
    fill="none"
    stroke="#fff"
    stroke-width="1.5"
    stroke-linejoin="round"
    stroke-linecap="round"
  />

  <!-- Pequeño asteroides en la esquina superior derecha -->
  <circle cx="26" cy="7" r="3.5" fill="none" stroke="#aaa" stroke-width="1.2"/>

  <!-- Estrella pequeña -->
  <circle cx="5" cy="8" r="0.8" fill="#fff"/>
  <circle cx="22" cy="14" r="0.6" fill="#fff"/>
  <circle cx="9" cy="20" r="0.7" fill="#fff"/>
</svg>
